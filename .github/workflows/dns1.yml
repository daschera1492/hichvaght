name: MasterDnsVPN Complete Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Preparation & Free Port 53
        run: |
          # آزاد کردن پورت 53 و تنظیم DNS موقت برای دانلودها
          sudo systemctl disable --now systemd-resolved
          sudo rm -f /etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo apt update && sudo apt install -y curl jq dnsutils unzip

      - name: Install MasterDnsVPN Server
        run: |
          curl -L https://raw.githubusercontent.com/masterking32/MasterDnsVPN/main/server_linux_install.sh -o install.sh
          chmod +x install.sh
          
          # اجرای نصب به صورت کاملاً خودکار
          # ترتیب ورودی‌ها: دامنه، تایید نصب، تایید سرویس سیستم
          echo -e "m.forwario.ir\ny\ny" | sudo ./install.sh
          
          echo "------------------------------------------------------"
          echo "🚀 MASTER DNS VPN IS READY"
          # نمایش کلید با دسترسی Root برای اطمینان از دیده شدن در لاگ
          KEY_PATH=$(sudo find /home/runner -name "encrypt_key.txt" | head -n 1)
          if [ ! -z "$KEY_PATH" ]; then
             echo "🔑 YOUR KEY:"
             sudo cat "$KEY_PATH"
          fi
          echo "------------------------------------------------------"

      - name: Setup Localtonet & Sync Cloudflare
        run: |
          # دانلود و آماده‌سازی لوکالتونت
          wget https://localtonet.com/download/localtonet-linux-x64.zip
          unzip localtonet-linux-x64.zip
          chmod +x localtonet
          
          # تنظیمات متغیرها
          ZONE_NAME="forwario.ir"
          RECORD_NAME="ms.forwario.ir"
          LTONET_ADDR="ngch1k49ba.localto.net"
          LTONET_TOKEN="BThSwYJOLoutmDay2rlsxWZRKPdvkFVg5"

          # ۱. استخراج Zone ID از کلاودفلر
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          
          if [ "$ZONE_ID" == "null" ]; then echo "❌ Zone ID not found!"; exit 1; fi

          # ۲. استخراج Record ID برای آپدیت
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$RECORD_NAME" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          
          if [ "$RECORD_ID" == "null" ]; then echo "❌ Record ID not found!"; exit 1; fi

          # ۳. اجرای لوکالتونت در پس‌زمینه (Background)
          # استفاده از nohup برای جلوگیری از بسته شدن با پایان مرحله
          nohup ./localtonet authtoken $LTONET_TOKEN > localtonet.log 2>&1 &
          
          echo "📡 Localtonet is running in background..."

          # ۴. حلقه مانیتورینگ و آپدیت DNS
          while true; do
            # پیدا کردن آی‌پی فعلی پل (Bridge) لوکالتونت
            NEW_IP=$(dig +short $LTONET_ADDR | head -1)
            
            if [[ "$NEW_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "🔗 Current Bridge IP: $NEW_IP"
              
              # ارسال درخواست آپدیت به API کلاودفلر
              HTTP_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
                -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"A\",\"name\":\"$RECORD_NAME\",\"content\":\"$NEW_IP\",\"ttl\":60,\"proxied\":false}")
              
              if [ "$HTTP_RESPONSE" == "200" ]; then
                echo "✅ Cloudflare DNS Updated successfully."
              else
                echo "❌ Failed to update Cloudflare. HTTP Status: $HTTP_RESPONSE"
              fi
            else
              echo "⚠️ Waiting for Localtonet DNS propagation..."
            fi
            
            # هر ۱۰ دقیقه یک بار چک کن (برای پایداری بیشتر)
            sleep 600
          done
