name: MasterDnsVPN Persistent Deploy (Localtonet Fixed)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Port 53 & Install Tools
        run: |
          # آزاد کردن پورت 53 برای Bind9
          sudo systemctl disable --now systemd-resolved
          sudo rm -f /etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo apt update && sudo apt install -y curl jq dnsutils unzip

      - name: Install Localtonet
        run: |
          wget https://localtonet.com/download/localtonet-linux-x64.zip
          unzip localtonet-linux-x64.zip
          chmod +x localtonet

      - name: Install MasterDnsVPN Server
        run: |
          curl -L https://raw.githubusercontent.com/masterking32/MasterDnsVPN/main/server_linux_install.sh -o install.sh
          chmod +x install.sh
          # تنظیم دامنه و کلید اختصاصی
          echo -e "m.forwario.ir\n${{ secrets.VPN_ENCRYPT_KEY }}" | sudo ./install.sh

      - name: Start Localtonet & Sync DNS
        run: |
          ZONE_NAME="forwario.ir"
          RECORD_NAME="ms.forwario.ir"
          LTONET_ADDR="ngch1k49ba.localto.net"
          LTONET_TOKEN="BThSwYJOLoutmDay2rlsxWZRKPdvkFVg5"

          # ۱. پیدا کردن Zone ID
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          
          if [ "$ZONE_ID" == "null" ]; then echo "❌ Zone ID not found!"; exit 1; fi

          # ۲. پیدا کردن Record ID
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$RECORD_NAME" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          
          if [ "$RECORD_ID" == "null" ]; then echo "❌ Record ID not found!"; exit 1; fi

          # ۳. اجرای کلاینت لوکالتونت در پس‌زمینه
          ./localtonet authtoken $LTONET_TOKEN > localtonet.log 2>&1 &
          
          echo "🚀 Localtonet started. Syncing $LTONET_ADDR with $RECORD_NAME"

          # حلقه برای نگه داشتن رانر و چک کردن آی‌پی
          while true; do
            # استخراج آی‌پی آدرس تونل شما
            NEW_IP=$(dig +short $LTONET_ADDR | head -1)
            
            if [[ "$NEW_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "🔗 Current IP: $NEW_IP"
              
              # آپدیت رکورد کلودفلر
              curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
                -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
                -H "Content-Type: application/json" \
                --data "{\"type\":\"A\",\"name\":\"$RECORD_NAME\",\"content\":\"$NEW_IP\",\"ttl\":60,\"proxied\":false}"
              
              echo "✅ Cloudflare Updated. Waiting for next check..."
            else
              echo "⚠️ Waiting for DNS to resolve $LTONET_ADDR..."
            fi

            # چون آدرس ثابت است، هر ۱۵ دقیقه یکبار چک می‌کنیم که اگر سرور لوکالتونت عوض شد آپدیت شود
            sleep 900
          done
