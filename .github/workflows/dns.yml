name: MasterDnsVPN Persistent Deploy (Pinggy Final Fixed)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # اجرای خودکار برای پوشش محدودیت 6 ساعته رانر [۱۰۱، ۳۸۱]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 355 # حداکثر زمان مجاز رانر گیت‌هاب [۱۰۱]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Preparation and Port 53 Clearance
        run: |
          # آزاد کردن پورت 53 که توسط سیستم اشغال شده است [۲۳۷، ۳۶۴]
          sudo systemctl disable --now systemd-resolved
          sudo rm -f /etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo apt update
          sudo apt install -y curl jq dnsutils ssh

      - name: Install MasterDnsVPN
        run: |
          # دانلود و نصب سرور با دامنه و کلید شما از بخش Secrets [۱۹۸، ۳۷۴]
          curl -L https://raw.githubusercontent.com/masterking32/MasterDnsVPN/main/server_linux_install.sh -o install.sh
          chmod +x install.sh
          echo -e "m.forwario.ir\n${{ secrets.VPN_ENCRYPT_KEY }}" | sudo ./install.sh

      - name: Start Persistent Tunnel Loop
        run: |
          ZONE_NAME="forwario.ir"
          RECORD_NAME="ms.forwario.ir"
          PINGGY_TOKEN="AqVBx1RzeEI+"

          # ۱. پیدا کردن Zone ID با اصلاح ساختار JQ (استفاده از ) [۹، ۳۶۹]
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result.id')
          
          if [ "$ZONE_ID" == "null" ] || [ -z "$ZONE_ID" ]; then echo "❌ Zone ID not found!"; exit 1; fi

          # ۲. پیدا کردن Record ID برای ms.forwario.ir با اصلاح JQ [۹، ۳۶۹]
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$RECORD_NAME" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result.id')
          
          if [ "$RECORD_ID" == "null" ] || [ -z "$RECORD_ID" ]; then echo "❌ Record ID not found!"; exit 1; fi

          echo "🚀 Starting MasterDnsVPN rotation loop (Every 50 mins)..."

          while true; do
            echo "🌐 Establishing new Pinggy Tunnel..."
            
            # اجرای تونل پینگی برای پورت 53 در پس‌زمینه [۳۶۵، ۳۷۷]
            ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
              -R0:localhost:53 ${PINGGY_TOKEN}udp@free.pinggy.io > pinggy.log 2>&1 &
            TUNNEL_PID=$!

            sleep 20 # صبر برای برقراری تونل [۳۷۷]
            
            # استخراج آدرس و تبدیل آن به آی‌پی عددی [۳۶۷، ۳۶۹]
            PINGGY_URL=$(grep -oP '\S+\.pinggy\.link' pinggy.log | head -1)
            if [ -z "$PINGGY_URL" ]; then
              echo "❌ Failed to get URL, retrying in 10s..."
              kill $TUNNEL_PID
              sleep 10
              continue
            fi
            
            NEW_IP=$(dig +short $PINGGY_URL | head -1)
            echo "🔗 Tunnel Active: $PINGGY_URL -> IP: $NEW_IP"

            # ۳. آپدیت رکورد A در کلودفلر (حتماً proxied=false برای ترافیک UDP) [۱۹۸، ۳۶۷]
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$RECORD_NAME\",\"content\":\"$NEW_IP\",\"ttl\":60,\"proxied\":false}"
            
            echo "✅ DNS Updated. Next rotation in 50 minutes."

            # انتظار به مدت ۵۰ دقیقه برای دور زدن محدودیت ۶۰ دقیقه‌ای پینگی [۲۸۷، ۳۸۱]
            sleep 3000 

            echo "🔄 Rotating tunnel..."
            kill $TUNNEL_PID
            sleep 5
          done
