name: MasterDnsVPN Persistent Deploy (Pinggy Fixed)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *' # هر ۵ ساعت اجرا می‌شود تا محدودیت رانر رعایت شود

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 355 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Free Port 53 & Install Tools
        run: |
          # آزاد کردن پورت ۵۳ برای جلوگیری از تداخل
          sudo systemctl disable --now systemd-resolved
          sudo rm -f /etc/resolv.conf
          echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
          sudo apt update && sudo apt install -y curl jq dnsutils ssh

      - name: Install MasterDnsVPN Server
        run: |
          # نصب سرور با دامنه و کلید شما
          curl -L https://raw.githubusercontent.com/masterking32/MasterDnsVPN/main/server_linux_install.sh -o install.sh
          chmod +x install.sh
          # m.forwario.ir دامنه اصلی و کلید انکریپت از سکرت‌ها
          echo -e "m.forwario.ir\n${{ secrets.VPN_ENCRYPT_KEY }}" | sudo ./install.sh

      - name: Start Persistent Tunnel Loop
        run: |
          ZONE_NAME="forwario.ir"
          RECORD_NAME="ms.forwario.ir"
          PINGGY_TOKEN="AqVBx1RzeEI+"

          # ۱. پیدا کردن Zone ID (اصلاح شده با [0])
          ZONE_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          
          if [ "$ZONE_ID" == "null" ] || [ -z "$ZONE_ID" ]; then echo "❌ Zone ID یافت نشد!"; exit 1; fi

          # ۲. پیدا کردن Record ID (اصلاح شده با [0])
          RECORD_ID=$(curl -s -X GET "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?name=$RECORD_NAME" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" | jq -r '.result[0].id')
          
          if [ "$RECORD_ID" == "null" ] || [ -z "$RECORD_ID" ]; then echo "❌ Record ID یافت نشد!"; exit 1; fi

          echo "🚀 Starting MasterDnsVPN Loop..."

          while true; do
            echo "🌐 Opening new Pinggy Tunnel..."
            
            # اجرای تونل پینگی برای UDP پورت ۵۳
            ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 \
              -R0:localhost:53 ${PINGGY_TOKEN}udp@free.pinggy.io > pinggy.log 2>&1 &
            TUNNEL_PID=$!

            sleep 25 # صبر برای برقراری تونل
            
            # استخراج آدرس URL جدید
            PINGGY_URL=$(grep -oP '\S+\.pinggy\.link' pinggy.log | head -1)
            
            if [ -z "$PINGGY_URL" ]; then
              echo "❌ خطا در دریافت URL از پینگی، تلاش مجدد..."
              kill $TUNNEL_PID
              sleep 10
              continue
            fi
            
            # تبدیل URL به آی‌پی
            NEW_IP=$(dig +short $PINGGY_URL | head -1)
            
            if [ -z "$NEW_IP" ]; then
              echo "❌ آی‌پی یافت نشد، تلاش مجدد..."
              kill $TUNNEL_PID
              continue
            fi

            echo "🔗 Tunnel Active: $PINGGY_URL -> IP: $NEW_IP"

            # ۳. آپدیت رکورد A در کلودفلر
            curl -s -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"A\",\"name\":\"$RECORD_NAME\",\"content\":\"$NEW_IP\",\"ttl\":60,\"proxied\":false}"
            
            echo "✅ DNS Updated. Next rotation in 50 minutes."

            # ۵۰ دقیقه صبر (۳۰۰۰ ثانیه)
            sleep 3000 

            echo "🔄 Rotating tunnel..."
            kill $TUNNEL_PID
            sleep 5
          done
