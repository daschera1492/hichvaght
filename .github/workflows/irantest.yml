name: Iran Connectivity Check

on:
  workflow_dispatch:

jobs:
  check-sites:
    runs-on: ubuntu-latest

    steps:
      - name: Check Iranian websites availability
        run: |
          sites=(
            "https://www.varzesh3.com"
            "https://www.time.ir"
            "https://www.farsnews.ir"
            "https://seyagh.com"
            "https://www.aparat.com"
          )

          for site in "${sites[@]}"; do
            echo "=============================="
            echo "Checking $site ..."
            
            status=$(curl -o /dev/null -s -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 10 \
              $site || echo "000")

            if [ "$status" = "000" ]; then
              echo "❌ $site TIMEOUT / BLOCKED"
            elif [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "✅ $site ACCESSIBLE (HTTP $status)"
            else
              echo "⚠️ $site ERROR (HTTP $status)"
            fi
          done
