name: chisel-runner

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 ساعت

    steps:
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y curl wget

      - name: Download chisel
        run: |
          wget https://github.com/jpillora/chisel/releases/latest/download/chisel_linux_amd64.gz
          gunzip chisel_linux_amd64.gz
          chmod +x chisel_linux_amd64
          mv chisel_linux_amd64 chisel

      - name: Run script
        run: |
          bash << 'EOF'
          check_site() {
            curl -m 5 -s https://www.time.ir > /dev/null
            TIME_OK=$?

            curl -m 5 -s https://www.varzesh3.com > /dev/null
            VARZESH_OK=$?

            if [ $TIME_OK -eq 0 ] && [ $VARZESH_OK -eq 0 ]; then
              return 0
            else
              return 1
            fi
          }

          if check_site; then
            timeout 6h ./chisel client 87.107.105.90:9012 R:0.0.0.0:1080:socks
          else
            exit 1
          fi
          EOF
