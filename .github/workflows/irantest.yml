name: chisel-runner

on:
  schedule:
    - cron: "*/4 * * * *"
  workflow_dispatch:

concurrency:
  group: chisel-runner
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 ساعت

    steps:
      - name: Check connectivity first
        id: check
        run: |
          echo "Checking connectivity..."

          if curl -m 5 -s https://www.time.ir > /dev/null; then
            TIME_OK=0
          else
            TIME_OK=1
          fi

          if curl -m 5 -s https://www.varzesh3.com > /dev/null; then
            VARZESH_OK=0
          else
            VARZESH_OK=1
          fi

          if [ $TIME_OK -eq 0 ] && [ $VARZESH_OK -eq 0 ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "Internet OK"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "Internet NOT OK"
          fi

      - name: Run chisel only if connectivity OK
        if: steps.check.outputs.ok == 'true'
        run: |
          echo "Installing dependencies..."
          sudo apt update
          sudo apt install -y curl wget gzip

          echo "Downloading chisel..."
          wget https://github.com/jpillora/chisel/releases/download/v1.11.5/chisel_1.11.5_linux_amd64.gz
          gunzip chisel_1.11.5_linux_amd64.gz
          chmod +x chisel_1.11.5_linux_amd64
          mv chisel_1.11.5_linux_amd64 chisel

          echo "Starting chisel for 6 hours..."
          timeout 6h ./chisel client 87.107.105.90:9012 R:0.0.0.0:1080:socks
