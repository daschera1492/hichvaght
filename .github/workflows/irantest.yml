name: chisel-runner

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: chisel-runner
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 ساعت

    steps:
      - name: Check connectivity first
        id: check
        run: |
          echo "Checking connectivity..."

          # بررسی time.ir
          if curl -m 5 -s https://www.time.ir > /dev/null; then
            TIME_OK=0
          else
            TIME_OK=1
          fi

          # بررسی varzesh3.com
          if curl -m 5 -s https://www.varzesh3.com > /dev/null; then
            VARZESH_OK=0
          else
            VARZESH_OK=1
          fi

          # خروجی برای مراحل بعدی
          if [ $TIME_OK -eq 0 ] && [ $VARZESH_OK -eq 0 ]; then
            echo "ok=true" >> $GITHUB_OUTPUT
            echo "Internet OK"
          else
            echo "ok=false" >> $GITHUB_OUTPUT
            echo "Internet NOT OK"
          fi

      - name: Stop if no connectivity
        if: steps.check.outputs.ok != 'true'
        run: |
          echo "Skipping runner (no access)"
          exit 0

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y curl wget

      - name: Download chisel
        run: |
          wget https://github.com/jpillora/chisel/releases/download/v1.11.5/chisel_1.11.5_linux_amd64.gz
          gunzip chisel_1.11.5_linux_amd64.gz
          chmod +x chisel_1.11.5_linux_amd64
          mv chisel_1.11.5_linux_amd64 chisel

      - name: Run chisel
        run: |
          echo "Starting chisel..."
          timeout 6h ./chisel client 87.107.105.90:9012 R:0.0.0.0:1080:socks
