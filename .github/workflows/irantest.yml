name: Check External Access to IP

on:
  workflow_dispatch:

jobs:
  check-ip:
    runs-on: ubuntu-latest

    steps:
      - name: Test connectivity
        run: |
          IP="87.107.105.90"

          echo "==== PING TEST ===="
          if ping -c 2 -W 2 $IP > /dev/null; then
            echo "✅ Ping OK"
          else
            echo "❌ Ping FAILED"
          fi

          echo "==== TCP TEST ===="
          for port in 22 80 443; do
            echo "Checking port $port ..."
            timeout 5 bash -c "</dev/tcp/$IP/$port" \
              && echo "✅ Port $port OPEN" \
              || echo "❌ Port $port CLOSED or FILTERED"
          done

          echo "==== HTTP TEST ===="
          curl -I --connect-timeout 5 http://$IP || echo "❌ HTTP FAILED"
