name: Iran Connectivity Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # هر یک ساعت (اختیاری)

jobs:
  check-sites:
    runs-on: ubuntu-latest

    steps:
      - name: Check Iranian websites availability
        run: |
          sites=(
            "https://www.varzesh3.com"
            "https://www.time.ir"
            "https://www.farsnews.ir"
            "https://seyagh.com"
            "https://www.aparat.com"
          )

          for site in "${sites[@]}"; do
            echo "Checking $site ..."
            
            status=$(curl -o /dev/null -s -w "%{http_code}" --connect-timeout 5 $site)

            if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
              echo "✅ $site is ACCESSIBLE (HTTP $status)"
            else
              echo "❌ $site is NOT accessible (HTTP $status)"
            fi
          done
